name: Build Windows installer

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to upload the Windows installer to"
        required: true
        default: "v1.0.0"
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  windows-installer:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set release tag
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            "RELEASE_TAG=${{ inputs.tag }}" | Out-File -FilePath $env:GITHUB_ENV -Append
          }
          else {
            "RELEASE_TAG=${{ github.ref_name }}" | Out-File -FilePath $env:GITHUB_ENV -Append
          }

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Windows build dependencies
        shell: pwsh
        run: |
          choco install ffmpeg innosetup -y --no-progress
          "C:\ProgramData\chocolatey\bin" | Out-File -FilePath $env:GITHUB_PATH -Append
          "C:\Program Files (x86)\Inno Setup 6" | Out-File -FilePath $env:GITHUB_PATH -Append
          python -m pip install --upgrade pip

      - name: Build EXE and installer
        shell: pwsh
        run: .\scripts\build_windows.ps1

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: YouTubeDownloaderSetup
          path: dist/packages/YouTubeDownloaderSetup.exe

      - name: Create or update release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view $env:RELEASE_TAG --repo $env:GITHUB_REPOSITORY
          if ($LASTEXITCODE -ne 0) {
            gh release create $env:RELEASE_TAG --repo $env:GITHUB_REPOSITORY --title "YouTube Downloader 1.0.0" --notes "Version Windows compilee automatiquement avec yt-dlp, ffmpeg et ffprobe integres."
          }
          gh release upload $env:RELEASE_TAG dist/packages/YouTubeDownloaderSetup.exe --repo $env:GITHUB_REPOSITORY --clobber
